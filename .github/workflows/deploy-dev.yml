name: Deploy to DEV VPS (auto on main)

# Auto-deploys every push to main → /opt/pb-extension-dev/ on the VPS
# (which serves extension-dev.phoneburner.biz).
#
# Production deploys are handled by deploy-prod.yml (triggered by pushing a
# prod-* tag) and target /opt/pb-extension/ (extension.phoneburner.biz).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install SSH key and known_hosts
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy script on server (dev env)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Invoke via `bash <path>` so the script doesn't need the executable
          # bit. Git tracks the script as mode 100644, and `core.filemode false`
          # doesn't preserve +x across pulls, so direct execution would break
          # whenever the script content changes. `bash <path>` works regardless.
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            'sudo -n bash /opt/pb-extension-dev/scripts/deploy-on-server.sh'
