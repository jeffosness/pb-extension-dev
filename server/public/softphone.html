<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhoneBurner Click-to-Call</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #121b2e;
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.55);
        --primary: #3e6ff0;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .header {
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex: 0 0 auto;
      }
      .title { font-weight: 800; }
      #sp-status {
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 8px;
        white-space: nowrap;
      }
      .frame-wrap { flex: 1 1 auto; min-height: 220px; background: #000; }
      #sp-frame { width: 100%; height: 100%; border: 0; display: block; }
      .controls {
        flex: 0 0 auto;
        border-top: 1px solid var(--border);
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 10px;
        padding: 8px 12px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      details summary { cursor: pointer; color: var(--muted); font-size: 12px; }
      #sp-log {
        margin: 6px 0 0;
        padding: 8px;
        max-height: 140px;
        overflow-y: auto;
        background: #0a0f1c;
        border: 1px solid var(--border);
        border-radius: 8px;
        font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: var(--muted);
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="title">PhoneBurner Click-to-Call</span>
      <span id="sp-status">connecting…</span>
    </div>
    <div class="frame-wrap">
      <iframe id="sp-frame" allow="microphone; autoplay" title="PhoneBurner Softphone"></iframe>
    </div>
    <div class="controls">
      <button id="sp-mic">🎤 Enable microphone for calls</button>
      <details>
        <summary>Event log</summary>
        <pre id="sp-log"></pre>
      </details>
    </div>
    <script src="softphone_host.js"></script>
  </body>
</html>
